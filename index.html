<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scooter Chaos Simulator</title>
  </head>
  <body>
    <div id="ui">
      <div class="controls-info">
        <h2>Scooter Chaos</h2>
        <p><strong>Rider (Blue)</strong>: [WASD] to Ride / Move when fallen</p>
        <p><strong>Pillion (Red)</strong>: [Arrows] to Move when fallen</p>
        <p style="color: #ffaa00; margin-top: 10px;"><em>Both must be ON to drive!</em></p>
        <p style="font-size: 0.8rem;">Scroll/Drag to rotate/zoom camera</p>
        <div class="stats">
          <div id="speed">Speed: 0.0</div>
          <div id="instability">Loading...</div>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
