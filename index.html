<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scooter Chaos Simulator</title>
  </head>
  <body>
    <div id="ui" style="display: none;">
      <div class="controls-info">
        <div class="stats">
          <div id="speed">Speed: 0.0</div>
          <div id="instability">Loading...</div>
        </div>
      </div>
    </div>

    <div id="compass">
      <div id="distance">--- m</div>
      <div class="needle-container">
        <div id="waypoint-arrow" title="Finish Direction"></div>
        <div id="heading-arrow" title="Current Heading"></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
