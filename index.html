<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Scooter Controller</title>
  </head>
  <body>
    <div id="ui">
      <div class="controls-info">
        <h2>Scooter Prototype</h2>
        <p><strong>Player 1 (Front)</strong>: [A] [D] to Steer</p>
        <p><strong>Player 2 (Back)</strong>: [W] [S] to Gas/Brake</p>
        <div class="stats">
          <div id="speed">Speed: 0.0</div>
          <div id="instability">Instability: 0%</div>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
